<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Manage Staff – Andik's Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--y:#F5C800;--yd:#D4A900;--bk:#011041;--sw:260px;}
*{font-family:'Poppins',sans-serif;}body{background:#F4F5F7;margin:0;}
.sidebar{width:var(--sw);min-height:100vh;background:var(--bk);position:fixed;top:0;left:0;display:flex;flex-direction:column;z-index:200;}
.sb-header{padding:1.2rem;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px;}
.sb-logo{width:42px;height:42px;background:var(--y);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.1rem;color:var(--bk);flex-shrink:0;}
.sb-brand{color:var(--y);font-weight:700;font-size:.9rem;line-height:1.2;}
.sb-role{color:rgba(255,255,255,.4);font-size:.68rem;}
.sb-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.25);padding:.8rem 1.4rem .3rem;}
.sb-link{display:flex;align-items:center;gap:10px;padding:.58rem 1.4rem;color:rgba(255,255,255,.65);text-decoration:none;font-size:.86rem;font-weight:500;transition:.2s;border-left:3px solid transparent;}
.sb-link i{width:18px;text-align:center;}
.sb-link:hover{color:#fff;background:rgba(255,255,255,.06);}
.sb-link.active{color:var(--y);background:rgba(245,200,0,.08);border-left-color:var(--y);}
.sb-footer{padding:1rem 1.4rem;border-top:1px solid rgba(255,255,255,.08);margin-top:auto;}
.main{margin-left:var(--sw);display:flex;flex-direction:column;min-height:100vh;}
.topbar{background:#fff;height:64px;display:flex;align-items:center;padding:0 1.5rem;border-bottom:1px solid #EBEBEB;position:sticky;top:0;z-index:100;}
.topbar-title{font-weight:700;font-size:1.1rem;flex:1;}
.avatar{width:36px;height:36px;background:var(--y);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;color:var(--bk);}
.content{padding:1.8rem;}
.panel{background:#fff;border-radius:14px;border:1px solid #EBEBEB;padding:1.4rem;margin-bottom:1.4rem;}
.btn-y{background:var(--y);color:var(--bk);font-weight:700;border:none;border-radius:8px;}
.btn-y:hover{background:var(--yd);color:var(--bk);}
.form-control:focus{border-color:var(--y);box-shadow:0 0 0 3px rgba(245,200,0,.2);}
.modal-header{background:var(--bk);border-radius:16px 16px 0 0;}
.modal-title{color:var(--y);font-weight:700;}
.modal-content{border-radius:16px;border:none;}
.staff-card{background:#fff;border-radius:14px;border:1px solid #EBEBEB;padding:1rem 1.2rem;display:flex;align-items:center;gap:1rem;transition:.2s;}
.staff-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.07);}
.staff-av{width:48px;height:48px;border-radius:50%;background:var(--y);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.1rem;color:var(--bk);flex-shrink:0;}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sb-header">
    <div class="sb-logo">A</div>
    <div><div class="sb-brand">Andik's Desserts</div><div class="sb-role">Admin Portal</div></div>
  </div>
  <nav style="padding:1rem 0;flex:1;overflow-y:auto">
    <div class="sb-label">Main</div>
    <a href="../staff/dashboard.html" class="sb-link"><i class="bi bi-speedometer2"></i>Dashboard</a>
    <div class="sb-label">Menu</div>
    <a href="../staff/menu.html" class="sb-link"><i class="bi bi-grid"></i>Menu Items</a>
    <div class="sb-label">Engagement</div>
    <a href="/project/group-24/staff/comments.html" class="sb-link"><i class="bi bi-chat-left-text"></i>Comments</a>
    <a href="../staff/staff-announcements.html" class="sb-link"><i class="bi bi-megaphone"></i>Announcements</a>
    <div class="sb-label">Admin</div>
    <a href="../admin/dashboard.html" class="sb-link active"><i class="bi bi-people"></i>Manage Staff</a>
</nav>
  <div class="sb-footer">
    <button class="btn btn-sm w-100" style="background:rgba(255,255,255,.08);color:rgba(255,255,255,.6);border:none;border-radius:8px;padding:.5rem" onclick="DB.logout();location.href='http://localhost/project/group-24/customer/login.html'">
      <i class="bi bi-box-arrow-right me-2"></i>Logout
    </button>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-title">Manage Staff</div>
    <div class="d-flex align-items-center gap-2">
      <div class="avatar" id="userAvatar">A</div>
      <div class="d-none d-md-block"><div style="font-weight:600;font-size:.85rem" id="userName"></div><div style="font-size:.72rem;color:#999">Admin</div></div>
    </div>
  </div>
  <div class="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div><h5 class="mb-0" style="font-weight:700">Staff Accounts</h5><p class="text-muted mb-0" style="font-size:.82rem"><i class="bi bi-calendar-event me-1"></i>Today is <strong id="adminToday"></strong></p></div>
      <button class="btn btn-y d-flex align-items-center gap-2" data-bs-toggle="modal" data-bs-target="#staffModal" onclick="openAdd()"><i class="bi bi-person-plus"></i>Add Staff</button>
    </div>
    
    <!-- PENDING STAFF SECTION -->
<div id="pendingSection" style="display:none" class="mb-4">
  <div class="d-flex align-items-center gap-2 mb-3">
    <h5 class="mb-0" style="font-weight:700;color:#856404"><i class="bi bi-clock-history me-2"></i>Pending Approval</h5>
    <span style="background:#FFF3CD;color:#856404;font-size:.72rem;font-weight:600;padding:3px 10px;border-radius:20px">Waiting</span>
  </div>
  <div class="row g-3" id="pendingList"></div>
</div>

    <div class="panel py-3 mb-3">
      <input type="text" id="searchInput" class="form-control" placeholder="Search staff..." style="max-width:300px;border-radius:10px" oninput="renderStaff()">
    </div>
    <div class="row g-3" id="staffList"></div>
  </div>
</div>

<!-- ADD/EDIT STAFF MODAL -->
<div class="modal fade" id="staffModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle">Add Staff Account</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-4">
        <input type="hidden" id="editId">
        <div class="mb-3">
          <label class="form-label" style="font-weight:600;font-size:.88rem">Full Name *</label>
          <input type="text" id="fName" class="form-control" placeholder="Staff member's name" style="border-radius:10px">
        </div>
        <div class="mb-3">
          <label class="form-label" style="font-weight:600;font-size:.88rem">Email Address *</label>
          <input type="email" id="fEmail" class="form-control" placeholder="staff@andiks.my" style="border-radius:10px">
        </div>
        <div class="mb-3">
          <label class="form-label" style="font-weight:600;font-size:.88rem">Password *</label>
          <input type="password" id="fPass" class="form-control" placeholder="Min. 6 characters" style="border-radius:10px">
        </div>
      </div>
      <div class="modal-footer border-0 pt-0">
        <button type="button" class="btn btn-light" data-bs-dismiss="modal" style="border-radius:8px">Cancel</button>
        <button type="button" class="btn btn-y" onclick="saveStaff()"><i class="bi bi-person-check me-1"></i><span id="saveBtnLabel">Create Account</span></button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../phpdata/data.js"></script>
<script>
const user = DB.currentUser();
if (!user || user.role !== 'admin') location.href = 'http://localhost/project/group-24/customer/login.html';
document.getElementById('userAvatar').textContent = user.name.charAt(0).toUpperCase();
document.getElementById('userName').textContent = user.name;
document.getElementById('adminToday').textContent = DB.getDayName();

const ADMIN_API = "http://localhost/project/phpdata";

async function renderPending() {
  try {
    const res = await fetch(`${ADMIN_API}/get_staff.php?status=pending`);
    const pending = await res.json();
    const section = document.getElementById('pendingSection');
    const list = document.getElementById('pendingList');
    if (!pending.length) { section.style.display = 'none'; return; }
    section.style.display = 'block';
    list.innerHTML = pending.map(s => `
      <div class="col-lg-6">
        <div class="staff-card">
          <div class="staff-av" style="background:#FFF3CD;color:#856404">${s.name.charAt(0).toUpperCase()}</div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:700;font-size:.95rem">${s.name}</div>
            <div style="font-size:.82rem;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.email}</div>
            <span style="background:#FFF3CD;color:#856404;font-size:.72rem;font-weight:600;padding:2px 10px;border-radius:20px;display:inline-block;margin-top:4px">PENDING</span>
          </div>
          <div class="d-flex flex-column gap-1">
            <button class="btn btn-sm" style="background:#E1F5EE;color:#085041;border:none;border-radius:7px" onclick="approveStaff(${s.id})"><i class="bi bi-check-lg"></i></button>
            <button class="btn btn-sm" style="background:#FFEBEE;color:#C62828;border:none;border-radius:7px" onclick="rejectStaff(${s.id})"><i class="bi bi-x-lg"></i></button>
          </div>
        </div>
      </div>`).join('');
  } catch (err) {
    console.error("renderPending error:", err);
  }
}

async function renderStaff() {
  try {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const res = await fetch(`${ADMIN_API}/get_staff.php?status=active`);
    const staff = await res.json();
    const filtered = staff.filter(s =>
      s.name.toLowerCase().includes(search) ||
      s.email.toLowerCase().includes(search)
    );
    const list = document.getElementById('staffList');
    if (!filtered.length) {
      list.innerHTML = '<div class="col-12 text-center text-muted py-5"><i class="bi bi-people" style="font-size:2.5rem;display:block;margin-bottom:8px"></i>No staff accounts yet.</div>';
      return;
    }
    list.innerHTML = filtered.map(s => `
      <div class="col-lg-6">
        <div class="staff-card">
          <div class="staff-av">${s.name.charAt(0).toUpperCase()}</div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:700;font-size:.95rem">${s.name}</div>
            <div style="font-size:.82rem;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.email}</div>
            <span style="background:#E1F5EE;color:#085041;font-size:.72rem;font-weight:600;padding:2px 10px;border-radius:20px;display:inline-block;margin-top:4px">STAFF</span>
          </div>
          <div class="d-flex flex-column gap-1">
            <button class="btn btn-sm" style="background:#EDE7F6;color:#6A1B9A;border:none;border-radius:7px" onclick="openEdit(${s.id},'${s.name}','${s.email}')"><i class="bi bi-pencil"></i></button>
            <button class="btn btn-sm" style="background:#FFEBEE;color:#C62828;border:none;border-radius:7px" onclick="delStaff(${s.id})"><i class="bi bi-trash"></i></button>
          </div>
        </div>
      </div>`).join('');
  } catch (err) {
    console.error("renderStaff error:", err);
  }
}

async function approveStaff(id) {
  if (!confirm('Approve this staff registration?')) return;
  await fetch(`${ADMIN_API}/update_staff.php`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id, status: 'active' })
  });
  renderPending();
  renderStaff();
}

async function rejectStaff(id) {
  if (!confirm('Reject and remove this staff registration?')) return;
  await fetch(`${ADMIN_API}/delete_staff.php`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id })
  });
  renderPending();
}

function openAdd() {
  document.getElementById('modalTitle').textContent = 'Add Staff Account';
  document.getElementById('saveBtnLabel').textContent = 'Create Account';
  document.getElementById('editId').value = '';
  document.getElementById('fName').value = '';
  document.getElementById('fEmail').value = '';
  document.getElementById('fPass').value = '';
}

function openEdit(id, name, email) {
  document.getElementById('modalTitle').textContent = 'Edit Staff: ' + name;
  document.getElementById('saveBtnLabel').textContent = 'Save Changes';
  document.getElementById('editId').value = id;
  document.getElementById('fName').value = name;
  document.getElementById('fEmail').value = email;
  document.getElementById('fPass').value = '';
  new bootstrap.Modal(document.getElementById('staffModal')).show();
}

async function saveStaff() {
  const name = document.getElementById('fName').value.trim();
  const email = document.getElementById('fEmail').value.trim();
  const pass = document.getElementById('fPass').value;
  const editId = document.getElementById('editId').value;
  if (!name || !email) { alert('Name and email are required.'); return; }
  if (!editId && !pass) { alert('Password is required for new staff.'); return; }

  if (editId) {
    const body = { id: parseInt(editId), name, email };
    if (pass) body.password = pass;
    await fetch(`${ADMIN_API}/update_staff.php`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
  } else {
    await fetch(`${ADMIN_API}/add_staff.php`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password: pass, status: 'active' })
    });
  }

  bootstrap.Modal.getInstance(document.getElementById('staffModal')).hide();
  renderStaff();
}

async function delStaff(id) {
  if (!confirm('Remove this staff member?')) return;
  await fetch(`${ADMIN_API}/delete_staff.php`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id })
  });
  renderStaff();
}

renderPending();
renderStaff();
</script>
</body>
</html>
