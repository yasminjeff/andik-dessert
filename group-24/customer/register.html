<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Register – Andik's Desserts</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="../assets/favicon.png">
<style>
:root{--y:#F5C800;--yd:#D4A900;--bk:#011041;}
*{font-family:'Poppins',sans-serif;}
body{background:var(--bk);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem 0;}
.date-badge{position:absolute;top:2rem;right:2rem;background:rgba(245,200,0,.15);color:var(--y);padding:.5rem 1rem;border-radius:10px;font-weight:600;font-size:.85rem;}
.auth-card{background:#fff;border-radius:20px;padding:2.5rem 2rem;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.4);}
.auth-logo{width:64px;height:64px;background:var(--y);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.8rem;font-weight:800;color:var(--bk);margin:0 auto 1rem;}
.btn-y{background:var(--y);color:var(--bk);font-weight:700;border:none;border-radius:8px;width:100%;padding:.65rem;}
.btn-y:hover{background:var(--yd);color:var(--bk);}
.form-control:focus{border-color:var(--y);box-shadow:0 0 0 3px rgba(245,200,0,.2);}
.form-label{font-weight:600;font-size:.88rem;color:#444;}
</style>
</head>
<body>
<div class="date-badge"><i class="bi bi-calendar-event me-1"></i><span id="pageDate"></span></div>
<div style="position:absolute;top:2rem;left:2rem">
  <a href="index.html" class="btn btn-sm" style="background:rgba(255,255,255,.1);color:#fff;border:none;border-radius:8px;font-weight:600"><i class="bi bi-arrow-left me-1"></i>Go Back</a>
</div>
<div class="auth-card">
  <img src="../assets/andikDessert.png" alt="Andik's Desserts Logo" style="width:64px;height:64px;border-radius:50%;object-fit:cover;margin:0 auto 1rem;display:block;">
  <h2 class="text-center mb-1" style="font-size:1.4rem;font-weight:800">Create Account</h2>
  <p class="text-center text-muted mb-4" style="font-size:.85rem">Welcome! Register for a new staff account.</p>

  <div class="alert alert-danger py-2 mb-3" id="errMsg" style="display:none;font-size:.85rem;border-radius:10px"></div>
  <div class="alert alert-success py-2 mb-3" id="okMsg" style="display:none;font-size:.85rem;border-radius:10px"></div>

  <div class="mb-3">
    <label class="form-label">Full Name</label>
    <input type="text" id="nameInput" class="form-control" placeholder="Your name" style="border-radius:10px">
  </div>
  <div class="mb-3">
    <label class="form-label">Email Address</label>
    <input type="email" id="emailInput" class="form-control" placeholder="you@example.com" style="border-radius:10px">
    <div style="font-size:.78rem;color:#888;margin-top:4px"><i class="bi bi-info-circle me-1"></i>Staff must register with an @andiks.my email (e.g. syasya@andiks.my).</div>
  </div>
  <div class="mb-3">
    <label class="form-label">Password</label>
    <input type="password" id="passInput" class="form-control" placeholder="Min. 6 characters" style="border-radius:10px">
  </div>
  <div class="mb-4">
    <label class="form-label">Confirm Password</label>
    <input type="password" id="pass2Input" class="form-control" placeholder="Re-enter password" style="border-radius:10px">
  </div>
  <button class="btn btn-y mb-3" onclick="doRegister()">Register</button>
  <p class="text-center text-muted" style="font-size:.85rem">Already have an account? <a href="login.html" style="color:var(--y);font-weight:600">Login</a></p>
</div>

<script src="../phpdata/data.js"></script>
<script>
document.getElementById('pageDate').textContent = DB.getDayName();

async function doRegister() {
  const name = document.getElementById('nameInput').value.trim();
  const email = document.getElementById('emailInput').value.trim();
  const pass = document.getElementById('passInput').value;
  const pass2 = document.getElementById('pass2Input').value;
  const err = document.getElementById('errMsg');
  const ok = document.getElementById('okMsg');
  err.style.display = 'none'; ok.style.display = 'none';

  if (!name || !email || !pass) { err.textContent = 'All fields are required.'; err.style.display = ''; return; }
  if (!email.endsWith('@andiks.my') || email.split('@')[0].length === 0) { err.textContent = 'Staff must register with an @andiks.my email (e.g. syasya@andiks.my).'; err.style.display = ''; return; }
  if (pass.length < 6) { err.textContent = 'Password must be at least 6 characters.'; err.style.display = ''; return; }
  if (pass !== pass2) { err.textContent = 'Passwords do not match.'; err.style.display = ''; return; }

  try {
    const res = await fetch('http://localhost/project/phpdata/register.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password: pass, role: 'staff' })
    });
    const data = await res.json();

    if (data.error) {
      err.textContent = data.message;
      err.style.display = '';
      return;
    }

    ok.innerHTML = `
      <i class="bi bi-clock-history me-2"></i>
      <strong>Registration submitted!</strong><br>
      <span style="font-size:.82rem">Your account is pending admin approval. You will be able to login once approved.</span>
    `;
    ok.style.display = '';
    document.querySelectorAll('input').forEach(i => i.disabled = true);
    document.querySelector('.btn-y').disabled = true;

  } catch (e) {
    err.textContent = 'Server error. Please try again.';
    err.style.display = '';
  }
}
</script>
</body>
</html>
