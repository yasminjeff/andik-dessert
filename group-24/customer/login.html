<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login – Andik's Desserts</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="../assets/favicon.png">
<style>
:root{--y:#F5C800;--yd:#D4A900;--bk:#011041;}
*{font-family:'Poppins',sans-serif;}
body{background:var(--bk);min-height:100vh;display:flex;align-items:center;justify-content:center;}
.date-badge{position:absolute;top:2rem;right:2rem;background:rgba(245,200,0,.15);color:var(--y);padding:.5rem 1rem;border-radius:10px;font-weight:600;font-size:.85rem;}
.auth-card{background:#fff;border-radius:20px;padding:2.5rem 2rem;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.4);}
.btn-y{background:var(--y);color:var(--bk);font-weight:700;border:none;border-radius:8px;width:100%;padding:.65rem;}
.btn-y:hover{background:var(--yd);color:var(--bk);}
.form-control:focus{border-color:var(--y);box-shadow:0 0 0 3px rgba(245,200,0,.2);}
.form-label{font-weight:600;font-size:.88rem;color:#444;}
#errMsg{display:none;}
</style>
</head>
<body>
<div class="date-badge"><i class="bi bi-calendar-event me-1"></i><span id="pageDate"></span></div>
<div style="position:absolute;top:2rem;left:2rem">
  <a href="index.html" class="btn btn-sm" style="background:rgba(255,255,255,.1);color:#fff;border:none;border-radius:8px;font-weight:600"><i class="bi bi-arrow-left me-1"></i>Go Back</a>
</div>
<div class="auth-card">
  <img src="../assets/andikDessert.png" alt="Andik's Desserts Logo" style="width:64px;height:64px;border-radius:50%;object-fit:cover;margin:0 auto 1rem;display:block;">
  <h2 class="text-center mb-1" style="font-size:1.4rem;font-weight:800">Welcome Back!</h2>
  <p class="text-center text-muted mb-4" style="font-size:.85rem">Please log in to your account.</p>

  <div class="alert alert-danger py-2 mb-3" id="errMsg" style="font-size:.85rem;border-radius:10px"></div>

  <div class="mb-3">
    <label class="form-label">Email Address</label>
    <input type="email" id="emailInput" class="form-control" placeholder="you@example.com" style="border-radius:10px">
  </div>
  <div class="mb-4">
    <label class="form-label">Password</label>
    <input type="password" id="passInput" class="form-control" placeholder="Your password" style="border-radius:10px">
    <div class="text-end mt-2"><a href="../reset_password.html" style="color:var(--y);font-weight:600;font-size:.9rem;text-decoration:none">Forgot password?</a></div>
  </div>
  <button class="btn btn-y mb-3" onclick="doLogin()">Login</button>
  <p class="text-center text-muted" style="font-size:.85rem">Don't have an account? <a href="register.html" style="color:var(--y);font-weight:600">Register</a></p>
</div>

<script src="../../phpdata/data.js"></script>
<script>
document.getElementById('pageDate').textContent = DB.getDayName();

async function doLogin() {
  const email = document.getElementById('emailInput').value.trim();
  const pass = document.getElementById('passInput').value;
  const err = document.getElementById('errMsg');
  err.style.display = 'none';

  if (!email || !pass) {
    err.textContent = 'Email and password are required.';
    err.style.display = '';
    return;
  }

  try {
    const res = await fetch('http://localhost/project/phpdata/login.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pass })
    });
    const data = await res.json();

    if (data.error) {
      err.textContent = data.message;
      err.style.display = '';
      return;
    }

    DB.setUser(data.user);

    if (data.user.role === 'admin') location.href = '../../admin/dashboard.html';
    else if (data.user.role === 'staff') location.href = '../staff/dashboard.html';
    else location.href = 'index.html';

  } catch (e) {
    err.textContent = 'Server error. Please try again.';
    err.style.display = '';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
