<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reset Password – Andik's Desserts</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--y:#F5C800;--yd:#D4A900;--bk:#011041;}
*{font-family:'Poppins',sans-serif;}
body{background:var(--bk);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem 0;}
.date-badge{position:absolute;top:2rem;right:2rem;background:rgba(245,200,0,.15);color:var(--y);padding:.5rem 1rem;border-radius:10px;font-weight:600;font-size:.85rem;}
.auth-card{background:#fff;border-radius:20px;padding:2.5rem 2rem;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.4);}
.auth-logo{width:64px;height:64px;background:var(--y);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.8rem;font-weight:800;color:var(--bk);margin:0 auto 1rem;}
.btn-y{background:var(--y);color:var(--bk);font-weight:700;border:none;border-radius:8px;width:100%;padding:.65rem;}
.btn-y:hover{background:var(--yd);color:var(--bk);}
.form-control:focus{border-color:var(--y);box-shadow:0 0 0 3px rgba(245,200,0,.2);}
.form-label{font-weight:600;font-size:.88rem;color:#444;}
.strength-bar{height:5px;border-radius:3px;transition:width .3s,background .3s;}
</style>
</head>
<body>

<div class="date-badge"><i class="bi bi-calendar-event me-1"></i><span id="pageDate"></span></div>
<div style="position:absolute;top:2rem;left:2rem">
  <a href="http://localhost/project/group-24/customer/login.html" class="btn btn-sm" style="background:rgba(255,255,255,.1);color:#fff;border:none;border-radius:8px;font-weight:600">
    <i class="bi bi-arrow-left me-1"></i>Back to Login
  </a>
</div>

<div class="auth-card">
  <div class="auth-logo"><i class="bi bi-shield-lock-fill" style="font-size:1.5rem"></i></div>
  <h2 class="text-center mb-1" style="font-size:1.4rem;font-weight:800">Reset Password</h2>
  <p class="text-center text-muted mb-4" style="font-size:.85rem">Enter your email and choose a new password.</p>

  <div class="alert alert-danger py-2 mb-3" id="errMsg" style="display:none;font-size:.85rem;border-radius:10px"></div>
  <div class="alert alert-success py-2 mb-3" id="okMsg" style="display:none;font-size:.85rem;border-radius:10px"></div>

  <div class="mb-3">
    <label class="form-label">Email Address</label>
    <input type="email" id="emailInput" class="form-control" placeholder="you@example.com" style="border-radius:10px">
  </div>

  <div class="mb-2">
    <label class="form-label">New Password</label>
    <div class="input-group">
      <input type="password" id="passInput" class="form-control" placeholder="Min. 6 characters" style="border-radius:10px 0 0 10px" oninput="checkStrength()">
      <button class="btn btn-outline-secondary" type="button" onclick="toggleVis('passInput',this)" style="border-radius:0 10px 10px 0;font-size:.85rem">
        <i class="bi bi-eye"></i>
      </button>
    </div>
    <div class="mt-1" style="background:#eee;border-radius:3px;overflow:hidden">
      <div class="strength-bar" id="strengthBar" style="width:0;background:#ccc"></div>
    </div>
    <small id="strengthLabel" class="text-muted" style="font-size:.75rem"></small>
  </div>

  <div class="mb-4">
    <label class="form-label">Confirm New Password</label>
    <div class="input-group">
      <input type="password" id="pass2Input" class="form-control" placeholder="Re-enter password" style="border-radius:10px 0 0 10px">
      <button class="btn btn-outline-secondary" type="button" onclick="toggleVis('pass2Input',this)" style="border-radius:0 10px 10px 0;font-size:.85rem">
        <i class="bi bi-eye"></i>
      </button>
    </div>
  </div>

  <button class="btn btn-y mb-3" id="submitBtn" onclick="doReset()">
    <span id="btnText">Reset Password</span>
    <span id="btnSpinner" class="spinner-border spinner-border-sm ms-2" style="display:none"></span>
  </button>
  <p class="text-center text-muted" style="font-size:.85rem">
    Remembered it? <a href="http://localhost/project/group-24/customer/login.html" style="color:var(--y);font-weight:600">Back to Login</a>
  </p>
</div>

<script>
document.getElementById('pageDate').textContent = new Date().toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});

function toggleVis(id, btn){
  const inp = document.getElementById(id);
  const isPass = inp.type === 'password';
  inp.type = isPass ? 'text' : 'password';
  btn.innerHTML = isPass ? '<i class="bi bi-eye-slash"></i>' : '<i class="bi bi-eye"></i>';
}

function checkStrength(){
  const val = document.getElementById('passInput').value;
  const bar = document.getElementById('strengthBar');
  const lbl = document.getElementById('strengthLabel');
  let score = 0;
  if (val.length >= 6)  score++;
  if (val.length >= 10) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;
  const levels = [
    {w:'0%',   c:'#ccc',    t:''},
    {w:'25%',  c:'#e74c3c', t:'Weak'},
    {w:'50%',  c:'#e67e22', t:'Fair'},
    {w:'75%',  c:'#f1c40f', t:'Good'},
    {w:'100%', c:'#2ecc71', t:'Strong'},
    {w:'100%', c:'#27ae60', t:'Very Strong'}
  ];
  const l = levels[score] || levels[0];
  bar.style.width = l.w; bar.style.background = l.c;
  lbl.textContent = l.t; lbl.style.color = l.c;
}

function validateEmail(email){
  if (!email) return 'Email is required.';
  const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if (!re.test(email)) return 'Please enter a valid email address.';
  return null;
}

async function doReset(){
  const email = document.getElementById('emailInput').value.trim();
  const pass  = document.getElementById('passInput').value;
  const pass2 = document.getElementById('pass2Input').value;
  const err   = document.getElementById('errMsg');
  const ok    = document.getElementById('okMsg');
  err.style.display = 'none'; ok.style.display = 'none';

  const emailErr = validateEmail(email);
  if (emailErr){ err.textContent = emailErr; err.style.display = ''; return; }
  if (!pass){ err.textContent = 'New password is required.'; err.style.display = ''; return; }
  if (pass.length < 6){ err.textContent = 'Password must be at least 6 characters.'; err.style.display = ''; return; }
  if (pass !== pass2){ err.textContent = 'Passwords do not match.'; err.style.display = ''; return; }

  document.getElementById('submitBtn').disabled = true;
  document.getElementById('btnSpinner').style.display = '';
  document.getElementById('btnText').textContent = 'Updating...';

  try {
    const res = await fetch('http://localhost/project/phpdata/reset_password.php', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ email, new_password: pass, confirm_password: pass2 })
    });
    const data = await res.json();
    if (data.success){
      ok.textContent = data.message + ' Redirecting to login...';
      ok.style.display = '';
      setTimeout(() => location.href = 'http://localhost/project/group-24/customer/login.html', 2000);
    } else {
      err.textContent = data.message || 'Something went wrong.';
      err.style.display = '';
    }
  } catch(e){
    err.textContent = 'Could not connect to server. Please try again.';
    err.style.display = '';
  } finally {
    document.getElementById('submitBtn').disabled = false;
    document.getElementById('btnSpinner').style.display = 'none';
    document.getElementById('btnText').textContent = 'Reset Password';
  }
}

document.addEventListener('keydown', e => { if(e.key === 'Enter') doReset(); });
</script>
</body>
</html>
