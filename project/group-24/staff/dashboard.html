<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Staff Dashboard – Andik's</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="../assets/favicon.png">
<style>
:root{--y:#F5C800;--yd:#D4A900;--bk:#011041;--sw:260px;}
*{font-family:'Poppins',sans-serif;}body{background:#F4F5F7;margin:0;}
.sidebar{width:var(--sw);min-height:100vh;background:var(--bk);position:fixed;top:0;left:0;display:flex;flex-direction:column;z-index:200;}
.sb-header{padding:1.2rem;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px;}
.sb-logo{width:42px;height:42px;background:var(--y);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.1rem;color:var(--bk);flex-shrink:0;}
.sb-brand{color:var(--y);font-weight:700;font-size:.9rem;line-height:1.2;}
.sb-role{color:rgba(255,255,255,.4);font-size:.68rem;}
.sb-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.25);padding:.8rem 1.4rem .3rem;}
.sb-link{display:flex;align-items:center;gap:10px;padding:.58rem 1.4rem;color:rgba(255,255,255,.65);text-decoration:none;font-size:.86rem;font-weight:500;transition:.2s;border-left:3px solid transparent;}
.sb-link i{width:18px;text-align:center;}
.sb-link:hover{color:#fff;background:rgba(255,255,255,.06);}
.sb-link.active{color:var(--y);background:rgba(245,200,0,.08);border-left-color:var(--y);}
.sb-footer{padding:1rem 1.4rem;border-top:1px solid rgba(255,255,255,.08);margin-top:auto;}
.main{margin-left:var(--sw);display:flex;flex-direction:column;min-height:100vh;}
.topbar{background:#fff;height:64px;display:flex;align-items:center;padding:0 1.5rem;border-bottom:1px solid #EBEBEB;position:sticky;top:0;z-index:100;gap:1rem;}
.topbar-title{font-weight:700;font-size:1.1rem;flex:1;}
.avatar{width:36px;height:36px;background:var(--y);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;color:var(--bk);}
.content{padding:1.8rem;}
.stat-card{background:#fff;border-radius:14px;padding:1.2rem 1.4rem;border:1px solid #EBEBEB;display:flex;align-items:center;gap:1rem;}
.stat-icon{width:50px;height:50px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;}
.stat-val{font-size:1.8rem;font-weight:800;line-height:1;}
.stat-lbl{font-size:.8rem;color:#888;margin-top:2px;}
.panel{background:#fff;border-radius:14px;border:1px solid #EBEBEB;padding:1.4rem;}
.panel-title{font-weight:700;font-size:.95rem;margin-bottom:1rem;}
.btn-y{background:var(--y);color:var(--bk);font-weight:700;border:none;border-radius:8px;}
.btn-y:hover{background:var(--yd);color:var(--bk);}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sb-header">
    <div class="sb-logo">A</div>
    <div><div class="sb-brand">Andik's Desserts</div><div class="sb-role" id="roleLabel">Staff Portal</div></div>
  </div>
  <nav style="padding:1rem 0;flex:1;overflow-y:auto">
    <div class="sb-label">Main</div>
    <a href="dashboard.html" class="sb-link active"><i class="bi bi-speedometer2"></i>Dashboard</a>
    <div class="sb-label">Menu</div>
    <a href="menu.html" class="sb-link"><i class="bi bi-grid"></i>Menu Items</a>
    <div class="sb-label">Engagement</div>
    <a href="comments.html" class="sb-link"><i class="bi bi-chat-left-text"></i>Comments</a>
    <a href="staff-announcements.html" class="sb-link"><i class="bi bi-megaphone"></i>Announcements</a>
    <div id="adminLinks"></div>
  </nav>
  <div class="sb-footer">
    <button class="btn btn-sm w-100" style="background:rgba(255,255,255,.08);color:rgba(255,255,255,.6);border:none;border-radius:8px;padding:.5rem" onclick="DB.logout();location.href='http://localhost/project/group-24/customer/login.html'">
      <i class="bi bi-box-arrow-right me-2"></i>Logout
    </button>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-title">Dashboard</div>
    <div style="font-size:.85rem;color:#666"><i class="bi bi-calendar-event me-1"></i>Today is <strong id="staffToday"></strong></div>
    <div class="d-flex align-items-center gap-2">
      <div class="avatar" id="userAvatar">?</div>
      <div class="d-none d-md-block">
        <div style="font-weight:600;font-size:.85rem" id="userName"></div>
        <div style="font-size:.72rem;color:#999" id="userRole"></div>
      </div>
    </div>
  </div>
  <div class="content">
    <div class="row g-3 mb-4">
      <div class="col-sm-6 col-xl-3">
        <div class="stat-card"><div class="stat-icon" style="background:#FFF9E0"><i class="bi bi-grid" style="color:var(--y)"></i></div><div><div class="stat-val" id="statTotal">0</div><div class="stat-lbl">Total Items</div></div></div>
      </div>
      <div class="col-sm-6 col-xl-3">
        <div class="stat-card"><div class="stat-icon" style="background:#E8F5E9"><i class="bi bi-check-circle" style="color:#2E7D32"></i></div><div><div class="stat-val" style="color:#2E7D32" id="statAvail">0</div><div class="stat-lbl">Available</div></div></div>
      </div>
      <div class="col-sm-6 col-xl-3">
        <div class="stat-card"><div class="stat-icon" style="background:#FFEBEE"><i class="bi bi-x-circle" style="color:#C62828"></i></div><div><div class="stat-val" style="color:#C62828" id="statOut">0</div><div class="stat-lbl">Out of Stock</div></div></div>
      </div>
      <div class="col-sm-6 col-xl-3">
        <div class="stat-card"><div class="stat-icon" style="background:#EDE7F6"><i class="bi bi-chat-left-text" style="color:#6A1B9A"></i></div><div><div class="stat-val" style="color:#6A1B9A" id="statComments">0</div><div class="stat-lbl">Total Reviews</div></div></div>
      </div>
    </div>

    <div class="row g-4">
      <div class="col-lg-8">
        <div class="panel">
          <div class="d-flex justify-content-between align-items-center panel-title">
            <span><i class="bi bi-chat-left-text me-2" style="color:var(--y)"></i>Recent Reviews</span>
            <a href="comments.html" class="btn btn-sm btn-y">View All</a>
          </div>
          <div id="recentReviews"></div>
        </div>
      </div>
      <div class="col-lg-4">
        <div class="panel">
          <div class="panel-title"><i class="bi bi-lightning-charge me-2" style="color:var(--y)"></i>Quick Actions</div>
          <div class="d-grid gap-2">
            <a href="menu.html" class="btn btn-y d-flex align-items-center gap-2"><i class="bi bi-plus-circle"></i>Add Menu Item</a>
            <a href="staff-announcements.html" class="btn d-flex align-items-center gap-2" style="background:#F4F5F7;color:var(--bk);font-weight:600;border:none;border-radius:8px"><i class="bi bi-megaphone"></i>Post Announcement</a>
            <a href="comments.html" class="btn d-flex align-items-center gap-2" style="background:#F4F5F7;color:var(--bk);font-weight:600;border:none;border-radius:8px"><i class="bi bi-chat-left-text"></i>Manage Comments</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../phpdata/data.js"></script>
<script>
const user = DB.currentUser();
if (!user || (user.role !== 'staff' && user.role !== 'admin')) { location.href = 'http://localhost/project/group-24/customer/login.html'; }

document.getElementById('userAvatar').textContent = user.name.charAt(0).toUpperCase();
document.getElementById('userName').textContent = user.name;
document.getElementById('userRole').textContent = user.role.charAt(0).toUpperCase() + user.role.slice(1);
document.getElementById('staffToday').textContent = DB.getDayName();
document.getElementById('roleLabel').textContent = user.role === 'admin' ? 'Admin Portal' : 'Staff Portal';

if (user.role === 'admin') document.getElementById('adminLinks').innerHTML = `<div class="sb-label">Admin</div><a href="http://localhost/project/admin/dashboard.html" class="sb-link"><i class="bi bi-people"></i>Manage Staff</a>`;

const API_MENU = "http://localhost/project/group-24/get_menu.php";
const API_REVIEWS = "http://localhost/project/group-24/reviews/get_reviews.php";

async function loadDashboard() {
  try {
    const menuRes = await fetch(API_MENU);
    const menu = await menuRes.json();

    document.getElementById('statTotal').textContent = menu.length;
    document.getElementById('statAvail').textContent = menu.filter(i => i.available == 1).length;
    document.getElementById('statOut').textContent = menu.filter(i => i.available == 0).length;

    const revRes = await fetch(API_REVIEWS);
    const reviews = await revRes.json();

    document.getElementById('statComments').textContent = reviews.length;

    const rr = document.getElementById('recentReviews');
    const recent = reviews.slice(-5).reverse();

    if (!recent.length) {
      rr.innerHTML = '<div class="text-muted text-center py-3" style="font-size:.88rem">No reviews yet.</div>';
    } else {
      rr.innerHTML = recent.map(r => {
        const item = menu.find(i => i.id == r.item_id);
        return `<div class="d-flex align-items-start gap-3 py-3" style="border-bottom:1px solid #F0F0F0">
          <div style="width:36px;height:36px;background:var(--y);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.82rem;color:var(--bk);flex-shrink:0">A</div>
          <div style="flex:1;min-width:0">
            <div class="d-flex justify-content-between">
              <span style="font-weight:600;font-size:.88rem">Anonymous</span>
              <span style="background:#FFEBEE;color:#C62828;font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:20px">New</span>
            </div>
            <div style="font-size:.8rem;color:#888;margin:1px 0">${item ? item.name : 'Unknown item'}</div>
            <p style="font-size:.83rem;color:#555;margin:2px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.comment || ''}</p>
          </div>
        </div>`;
      }).join('');
    }

  } catch (err) {
    console.error("loadDashboard error:", err);
  }
}

loadDashboard();
</script>
</body>
</html>
