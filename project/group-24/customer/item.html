<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Item – Andik's Desserts</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="../assets/favicon.png">
<style>
:root{--y:#F5C800;--yd:#D4A900;--bk:#011041;}
*{font-family:'Poppins',sans-serif;}body{background:#F8F8F8;}
.navbar{background:var(--bk);}
.brand-logo{width:44px;height:44px;background:var(--y);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.1rem;color:var(--bk);}
.brand-name{color:var(--y);font-weight:700;font-size:1rem;line-height:1.2;}
.brand-sub{color:rgba(255,255,255,.5);font-size:.68rem;}
.nav-link-c{color:rgba(255,255,255,.75)!important;font-weight:500;font-size:.88rem;padding:.4rem 1rem!important;border-radius:6px;}
.nav-link-c:hover,.nav-link-c.active{color:var(--y)!important;background:rgba(245,200,0,.08);}
.btn-y{background:var(--y);color:var(--bk);font-weight:700;border:none;border-radius:8px;}
.btn-y:hover{background:var(--yd);color:var(--bk);}
.btn-yo{background:transparent;color:var(--y);font-weight:600;border:2px solid var(--y);border-radius:8px;transition:.2s;}
.btn-yo:hover{background:var(--y);color:var(--bk);}
.panel{background:#fff;border-radius:14px;border:1px solid #EBEBEB;padding:1.5rem;}
.star-btn{background:none;border:none;font-size:1.5rem;color:#E0E0E0;cursor:pointer;padding:0 2px;transition:.2s;}
.star-btn.active{color:var(--y);}
.star-btn:hover{color:var(--y);}
.review-item{border-bottom:1px solid #F0F0F0;padding:1rem 0;}
.review-item:last-child{border-bottom:none;}
.reply-box{background:#FFFDE7;border-left:3px solid var(--y);border-radius:8px;padding:.8rem;margin-top:.6rem;}
</style>
</head>
<body>
<nav class="navbar sticky-top shadow">
  <div class="container d-flex align-items-center justify-content-between py-2">
    <a href="index.html" class="d-flex align-items-center gap-2 text-decoration-none">
      <img src="../assets/andikDessert.png" alt="Andik's Desserts Logo" style="width:44px;height:44px;border-radius:50%;object-fit:cover;">
      <div><div class="brand-name">Andik's Desserts</div><div class="brand-sub">Mini Cafe</div></div>
    </a>
    <ul class="nav d-none d-md-flex"><li><a href="index.html" class="nav-link-c nav-link"><i class="bi bi-house me-1"></i>Home</a></li><li><a href="menu.html" class="nav-link-c active nav-link"><i class="bi bi-grid me-1"></i>Menu</a></li><li><a href="announcements.html" class="nav-link-c nav-link"><i class="bi bi-megaphone me-1"></i>Announcements</a></li></ul>
    <div class="d-flex gap-3 align-items-center">
      <div style="background:rgba(245,200,0,.15);color:var(--y);padding:.4rem .8rem;border-radius:8px;font-weight:600;font-size:.85rem;white-space:nowrap"><i class="bi bi-calendar-event me-1"></i><span id="navDate"></span></div>
      <div class="d-flex gap-2" id="authButtons"></div>
    </div>
  </div>
</nav>

<div class="container py-5">
  <nav aria-label="breadcrumb" class="mb-4">
    <ol class="breadcrumb" style="font-size:.85rem">
      <li class="breadcrumb-item"><a href="index.html" style="color:var(--y)">Home</a></li>
      <li class="breadcrumb-item"><a href="menu.html" style="color:var(--y)">Menu</a></li>
      <li class="breadcrumb-item active" id="bcItem">Item</li>
    </ol>
  </nav>

  <div class="row g-5" id="itemDetail"></div>

  <!-- REVIEW SECTION -->
  <div class="mt-5">
    <div class="panel mb-4">
      <h5 style="font-weight:700;margin-bottom:1.2rem"><i class="bi bi-star me-2" style="color:var(--y)"></i>Leave a Review</h5>
      <div class="mb-3">
        <label style="font-weight:600;font-size:.88rem;display:block;margin-bottom:.5rem">Rating</label>
        <div id="starInput">
          <button class="star-btn" onclick="setRating(1)">★</button>
          <button class="star-btn" onclick="setRating(2)">★</button>
          <button class="star-btn" onclick="setRating(3)">★</button>
          <button class="star-btn" onclick="setRating(4)">★</button>
          <button class="star-btn" onclick="setRating(5)">★</button>
        </div>
      </div>
      <div class="mb-3">
        <label style="font-weight:600;font-size:.88rem;display:block;margin-bottom:.5rem">Comment</label>
        <textarea id="reviewComment" class="form-control" rows="3" placeholder="Share your experience..." style="border-radius:10px;resize:none"></textarea>
      </div>
      <button class="btn btn-y" onclick="submitReview()"><i class="bi bi-send me-1"></i>Submit Review</button>
      <div id="reviewMsg" class="mt-2" style="font-size:.85rem"></div>
    </div>

    <div class="panel">
      <h5 style="font-weight:700;margin-bottom:1.2rem"><i class="bi bi-chat-left-text me-2" style="color:var(--y)"></i>Customer Reviews <span id="reviewCountLabel" style="font-size:.85rem;color:#999;font-weight:400"></span></h5>
      <div id="reviewsList"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../phpdata/data.js"></script>
<script>
const params = new URLSearchParams(location.search);
const id = params.get('id');
const user = DB.currentUser();

const authDiv = document.getElementById('authButtons');
if (user) {
  authDiv.innerHTML = `<span class="text-white opacity-75 small">Hi, ${user.name}</span><button class="btn btn-sm btn-yo" onclick="DB.logout();location.reload()">Logout</button>`;
} else {
  authDiv.innerHTML = `<a href="login.html" class="btn btn-sm btn-yo">Login</a><a href="register.html" class="btn btn-sm btn-y">Register</a>`;
}

document.getElementById('navDate').textContent = DB.getDayName();

const ITEM_API = "http://localhost/project/group-24";
const REVIEWS_API = "http://localhost/project/group-24/reviews";

let selectedRating = 0;

function setRating(val) {
  selectedRating = val;
  document.querySelectorAll('.star-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i < val);
  });
}

async function loadItem() {
  try {
    const res = await fetch(`${ITEM_API}/get_menu.php`);
    if (!res.ok) throw new Error("Failed to load");
    const data = await res.json();
    const item = data.find(i => i.id == id);

    if (!item) {
      document.getElementById('itemDetail').innerHTML = '<div class="col-12 text-muted text-center py-5">Item not found.</div>';
      return;
    }

    document.title = item.name + " – Andik's";
    document.getElementById('bcItem').textContent = item.name;

    const stockBadge = item.available == 1
      ? `<span class="badge" style="background:#E8F5E9;color:#2E7D32;font-size:.82rem">In Stock</span>`
      : `<span class="badge" style="background:#FFEBEE;color:#C62828;font-size:.82rem">Out of Stock</span>`;

    const avgRating = parseFloat(item.avg_rating) || 0;
    const reviewCount = parseInt(item.review_count) || 0;

    document.getElementById('itemDetail').innerHTML = `
      <div class="col-lg-5">
        <img src="${item.image}" alt="${item.name}" style="width:100%;height:360px;object-fit:cover;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,.1)" onerror="this.src='../assets/images/placeholder.png'">
      </div>
      <div class="col-lg-7">
        <div class="d-flex align-items-center gap-3 mb-2">
          ${stockBadge}
          <span class="text-muted" style="font-size:.82rem">${item.category}</span>
        </div>
        <h1 style="font-size:2rem;font-weight:800;color:var(--bk)" class="mb-1">${item.name}</h1>
        <div class="d-flex align-items-center gap-2 mb-3">
          <span style="font-size:1rem">${DB.stars(avgRating)}</span>
          <span style="font-size:1.1rem;font-weight:700">${avgRating.toFixed(1)}</span>
          <span style="font-size:.82rem;color:#999">(${reviewCount} reviews)</span>
        </div>
        <div style="font-size:1.8rem;font-weight:800;margin-bottom:1rem">RM ${parseFloat(item.price).toFixed(2)}</div>
        <p style="color:#555;line-height:1.7;font-size:.95rem">${item.description || ''}</p>
        ${item.available == 1 ? `<div style="font-size:.85rem;color:#555;margin-bottom:1rem"><i class="bi bi-box-seam" style="color:var(--y)"></i> Stock: <strong>${item.stock} units</strong></div>` : ''}
        <a href="menu.html" class="btn btn-yo"><i class="bi bi-arrow-left me-1"></i>Back to Menu</a>
      </div>`;

    loadReviews();
  } catch (err) {
    console.error("loadItem error:", err);
    document.getElementById('itemDetail').innerHTML = '<div class="col-12 text-muted text-center py-5">Failed to load item.</div>';
  }
}

async function loadReviews() {
  try {
    const res = await fetch(`${REVIEWS_API}/get_reviews.php?item_id=${id}`);
    const reviews = await res.json();

    document.getElementById('reviewCountLabel').textContent = `(${reviews.length})`;

    const list = document.getElementById('reviewsList');
    if (!reviews.length) {
      list.innerHTML = '<div class="text-muted text-center py-3" style="font-size:.88rem">No reviews yet. Be the first to review!</div>';
      return;
    }

    list.innerHTML = reviews.map(r => {
      const stars = Array.from({length:5}, (_,i) =>
        `<i class="bi bi-star${i < r.rating ? '-fill' : ''}" style="color:${i < r.rating ? 'var(--y)' : '#E0E0E0'};font-size:.85rem"></i>`
      ).join('');

      return `
      <div class="review-item">
        <div class="d-flex justify-content-between align-items-start">
          <div class="d-flex gap-2 align-items-center">
            <div style="width:36px;height:36px;background:var(--y);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.82rem;color:var(--bk)">A</div>
            <div>
              <div style="font-weight:600;font-size:.88rem">Anonymous</div>
              <div style="font-size:.75rem;color:#999">${r.created_at || ''}</div>
            </div>
          </div>
          <div class="d-flex align-items-center gap-2">
            <div>${stars}</div>
            <button class="btn btn-sm" style="background:#FFEBEE;color:#C62828;border:none;border-radius:7px;font-size:.75rem" onclick="deleteMyReview(${r.id})">
              <i class="bi bi-trash"></i>
            </button>
          </div>
        </div>
        <p style="font-size:.88rem;color:#555;margin:.6rem 0 0;line-height:1.6">${r.comment || ''}</p>
        ${r.reply ? `
        <div class="reply-box mt-2">
          <div style="font-size:.72rem;font-weight:700;color:var(--bk);margin-bottom:4px"><i class="bi bi-reply-fill me-1" style="color:var(--y)"></i>Staff/Admin Reply</div>
          <p style="font-size:.85rem;color:#555;margin:0">${r.reply}</p>
        </div>` : ''}
      </div>`;
    }).join('');

  } catch (err) {
    console.error("loadReviews error:", err);
  }
}

async function submitReview() {
  const comment = document.getElementById('reviewComment').value.trim();
  const msg = document.getElementById('reviewMsg');

  if (!selectedRating) { msg.innerHTML = '<span style="color:#C62828">Please select a rating.</span>'; return; }
  if (!comment) { msg.innerHTML = '<span style="color:#C62828">Please write a comment.</span>'; return; }

  try {
    const res = await fetch(`${REVIEWS_API}/add_review.php`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ item_id: id, rating: selectedRating, comment })
    });
    const data = await res.json();

    if (data.error) { msg.innerHTML = `<span style="color:#C62828">${data.message}</span>`; return; }

    msg.innerHTML = '<span style="color:#2E7D32">✓ Review submitted!</span>';
    document.getElementById('reviewComment').value = '';
    setRating(0);
    setTimeout(() => { msg.innerHTML = ''; }, 2000);
    loadReviews();
  } catch (err) {
    msg.innerHTML = '<span style="color:#C62828">Server error. Please try again.</span>';
  }
}

async function deleteMyReview(reviewId) {
  if (!confirm('Delete your review?')) return;
  try {
    await fetch(`${REVIEWS_API}/delete_review.php`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: reviewId })
    });
    loadReviews();
  } catch (err) {
    alert('Server error. Please try again.');
  }
}

loadItem();
</script>
</body>
</html>
