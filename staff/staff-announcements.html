<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Announcements – Andik's Staff</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="../assets/favicon.png">
<style>
:root{--y:#F5C800;--yd:#D4A900;--bk:#011041;--sw:260px;}
*{font-family:'Poppins',sans-serif;}body{background:#F4F5F7;margin:0;}
.sidebar{width:var(--sw);min-height:100vh;background:var(--bk);position:fixed;top:0;left:0;display:flex;flex-direction:column;z-index:200;}
.sb-header{padding:1.2rem;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px;}
.sb-logo{width:42px;height:42px;background:var(--y);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.1rem;color:var(--bk);flex-shrink:0;}
.sb-brand{color:var(--y);font-weight:700;font-size:.9rem;line-height:1.2;}
.sb-role{color:rgba(255,255,255,.4);font-size:.68rem;}
.sb-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.25);padding:.8rem 1.4rem .3rem;}
.sb-link{display:flex;align-items:center;gap:10px;padding:.58rem 1.4rem;color:rgba(255,255,255,.65);text-decoration:none;font-size:.86rem;font-weight:500;transition:.2s;border-left:3px solid transparent;}
.sb-link i{width:18px;text-align:center;}
.sb-link:hover{color:#fff;background:rgba(255,255,255,.06);}
.sb-link.active{color:var(--y);background:rgba(245,200,0,.08);border-left-color:var(--y);}
.sb-footer{padding:1rem 1.4rem;border-top:1px solid rgba(255,255,255,.08);margin-top:auto;}
.main{margin-left:var(--sw);display:flex;flex-direction:column;min-height:100vh;}
.topbar{background:#fff;height:64px;display:flex;align-items:center;padding:0 1.5rem;border-bottom:1px solid #EBEBEB;position:sticky;top:0;z-index:100;}
.topbar-title{font-weight:700;font-size:1.1rem;flex:1;}
.avatar{width:36px;height:36px;background:var(--y);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;color:var(--bk);}
.content{padding:1.8rem;}
.panel{background:#fff;border-radius:14px;border:1px solid #EBEBEB;padding:1.4rem;margin-bottom:1.4rem;}
.panel-title{font-weight:700;font-size:.95rem;margin-bottom:1rem;color:var(--bk);}
.btn-y{background:var(--y);color:var(--bk);font-weight:700;border:none;border-radius:8px;}
.btn-y:hover{background:var(--yd);color:var(--bk);}
.form-control:focus,.form-select:focus{border-color:var(--y);box-shadow:0 0 0 3px rgba(245,200,0,.2);}
.ann-card{background:#fff;border-radius:14px;border:1px solid #EBEBEB;overflow:hidden;transition:.2s;}
.ann-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.07);}
.ann-top{background:var(--y);padding:.75rem 1.1rem;display:flex;align-items:center;gap:10px;}
.ann-icon{width:34px;height:34px;background:var(--bk);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sb-header">
    <div class="sb-logo">A</div>
    <div><div class="sb-brand">Andik's Desserts</div><div class="sb-role" id="roleLabel">Staff Portal</div></div>
  </div>
  <nav style="padding:1rem 0;flex:1;overflow-y:auto">
    <div class="sb-label">Main</div>
    <a href="dashboard.html" class="sb-link"><i class="bi bi-speedometer2"></i>Dashboard</a>
    <div class="sb-label">Menu</div>
    <a href="menu.html" class="sb-link"><i class="bi bi-grid"></i>Menu Items</a>
  
    <div class="sb-label">Engagement</div>
    <a href="comments.html" class="sb-link"><i class="bi bi-chat-left-text"></i>Comments</a>
    <a href="staff-announcements.html" class="sb-link active"><i class="bi bi-megaphone"></i>Announcements</a>
    <div id="adminLinks"></div>
  </nav>
  <div class="sb-footer">
    <button class="btn btn-sm w-100" style="background:rgba(255,255,255,.08);color:rgba(255,255,255,.6);border:none;border-radius:8px;padding:.5rem"
      onclick="DB.logout();location.href='http://localhost/project/group-24/customer/login.html'">
      <i class="bi bi-box-arrow-right me-2"></i>Logout
    </button>
  </div>
</aside>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div class="topbar-title">Announcements</div>
    <div class="d-flex align-items-center gap-2">
      <div class="avatar" id="userAvatar">?</div>
      <div class="d-none d-md-block">
        <div style="font-weight:600;font-size:.85rem" id="userName"></div>
        <div style="font-size:.72rem;color:#999" id="userRole"></div>
      </div>
    </div>
  </div>

  <div class="content">
    <div class="row g-4">

      <!-- POST FORM -->
      <div class="col-lg-4">
        <div class="panel">
          <div class="panel-title"><i class="bi bi-megaphone me-2" style="color:var(--y)"></i>Post Announcement</div>
          <div class="mb-3">
            <label class="form-label" style="font-weight:600;font-size:.88rem">Title *</label>
            <input type="text" id="annTitle" class="form-control" placeholder="e.g. New items available!" style="border-radius:10px">
          </div>
          <div class="mb-3">
            <label class="form-label" style="font-weight:600;font-size:.88rem">Message *</label>
            <textarea id="annBody" class="form-control" rows="4" placeholder="Write your announcement here..." style="border-radius:10px;resize:none"></textarea>
          </div>
          <div class="mb-4">
            <label class="form-label" style="font-weight:600;font-size:.88rem">Time (optional)</label>
            <input type="time" id="annTime" class="form-control" style="border-radius:10px">
          </div>
          <button class="btn btn-y w-100" onclick="postAnnouncement()">
            <i class="bi bi-send me-2"></i>Publish Announcement
          </button>
          <div id="successMsg" style="display:none" class="alert alert-success mt-3 py-2" style="border-radius:10px;font-size:.85rem">
            <i class="bi bi-check-circle me-1"></i>Announcement posted!
          </div>
        </div>
      </div>

      <!-- ANNOUNCEMENTS LIST -->
      <div class="col-lg-8">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h5 style="font-weight:700;margin:0">Posted Announcements</h5>
          <span id="annCount" class="text-muted" style="font-size:.85rem"></span>
        </div>
        <div id="annList"></div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../phpdata/data.js"></script>
<script>
const user = DB.currentUser();
if (!user || (user.role !== 'staff' && user.role !== 'admin')) location.href = 'http://localhost/project/group-24/customer/login.html';

document.getElementById('userAvatar').textContent = user.name.charAt(0).toUpperCase();
document.getElementById('userName').textContent = user.name;
document.getElementById('userRole').textContent = user.role.charAt(0).toUpperCase() + user.role.slice(1);
document.getElementById('roleLabel').textContent = user.role === 'admin' ? 'Admin Portal' : 'Staff Portal';
if (user.role === 'admin') document.getElementById('adminLinks').innerHTML = `<div class="sb-label">Admin</div><a href="http://localhost/project/admin/dashboard.html" class="sb-link"><i class="bi bi-people"></i>Manage Staff</a>`;

const ANN_API = "http://localhost/project/group-24";

async function renderAnnouncements() {
  try {
    const res = await fetch(`${ANN_API}/get_announcements.php`);
    const anns = await res.json();

    document.getElementById('annCount').textContent = `${anns.length} announcement${anns.length !== 1 ? 's' : ''}`;
    const list = document.getElementById('annList');

    if (!anns.length) {
      list.innerHTML = `<div class="panel text-center text-muted py-4">
        <div style="font-size:2.5rem;margin-bottom:8px">📢</div>
        <h6>No announcements yet</h6>
        <p class="small mb-0">Use the form to post your first announcement.</p>
      </div>`;
      return;
    }

    list.innerHTML = anns.map(a => `
      <div class="ann-card mb-3">
        <div class="ann-top">
          <div class="ann-icon">
            <i class="bi bi-megaphone-fill" style="color:var(--y);font-size:.9rem"></i>
          </div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:700;font-size:.92rem;color:var(--bk);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${a.title}</div>
            <div style="font-size:.72rem;color:rgba(0,0,0,.5)">${a.created_at}</div>
          </div>
          <button class="btn btn-sm ms-2" style="background:rgba(0,0,0,.15);color:var(--bk);border:none;border-radius:8px;flex-shrink:0"
            onclick="deleteAnn(${a.id})" title="Delete">
            <i class="bi bi-trash"></i>
          </button>
        </div>
        <div style="padding:1rem 1.1rem">
          <p style="font-size:.88rem;color:#444;line-height:1.7;margin:0">${a.body}</p>
          <div style="font-size:.75rem;color:#999;margin-top:.5rem">
            <i class="bi bi-person me-1"></i>Posted by ${user.name}
          </div>
        </div>
      </div>`).join('');

  } catch (err) {
    console.error("renderAnnouncements error:", err);
  }
}

async function postAnnouncement() {
  const title = document.getElementById('annTitle').value.trim();
  const body = document.getElementById('annBody').value.trim();

  if (!title || !body) { alert('Please fill in the title and message.'); return; }

  try {
    const res = await fetch(`${ANN_API}/add_announcement.php`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, body })
    });
    const data = await res.json();

    if (data.error) { alert(data.message); return; }

    document.getElementById('annTitle').value = '';
    document.getElementById('annBody').value = '';
    document.getElementById('annTime').value = '';

    const msg = document.getElementById('successMsg');
    msg.style.display = '';
    setTimeout(() => msg.style.display = 'none', 3000);

    renderAnnouncements();

  } catch (err) {
    alert('Server error. Please try again.');
  }
}

async function deleteAnn(id) {
  if (!confirm('Delete this announcement?')) return;
  try {
    await fetch(`${ANN_API}/delete_announcement.php`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id })
    });
    renderAnnouncements();
  } catch (err) {
    alert('Server error. Please try again.');
  }
}

renderAnnouncements();
</script>
</body>
</html>
