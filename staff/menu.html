<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Menu Items – Andik's Staff</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="../assets/favicon.png">
<style>
:root{--y:#F5C800;--yd:#D4A900;--bk:#011041;--sw:260px;}
*{font-family:'Poppins',sans-serif;}body{background:#F4F5F7;margin:0;}
.sidebar{width:var(--sw);min-height:100vh;background:var(--bk);position:fixed;top:0;left:0;display:flex;flex-direction:column;z-index:200;}
.sb-header{padding:1.2rem;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px;}
.sb-logo{width:42px;height:42px;background:var(--y);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.1rem;color:var(--bk);flex-shrink:0;}
.sb-brand{color:var(--y);font-weight:700;font-size:.9rem;line-height:1.2;}
.sb-role{color:rgba(255,255,255,.4);font-size:.68rem;}
.sb-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.25);padding:.8rem 1.4rem .3rem;}
.sb-link{display:flex;align-items:center;gap:10px;padding:.58rem 1.4rem;color:rgba(255,255,255,.65);text-decoration:none;font-size:.86rem;font-weight:500;transition:.2s;border-left:3px solid transparent;}
.sb-link i{width:18px;text-align:center;}
.sb-link:hover{color:#fff;background:rgba(255,255,255,.06);}
.sb-link.active{color:var(--y);background:rgba(245,200,0,.08);border-left-color:var(--y);}
.sb-footer{padding:1rem 1.4rem;border-top:1px solid rgba(255,255,255,.08);margin-top:auto;}
.main{margin-left:var(--sw);display:flex;flex-direction:column;min-height:100vh;}
.topbar{background:#fff;height:64px;display:flex;align-items:center;padding:0 1.5rem;border-bottom:1px solid #EBEBEB;position:sticky;top:0;z-index:100;}
.topbar-title{font-weight:700;font-size:1.1rem;flex:1;}
.avatar{width:36px;height:36px;background:var(--y);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;color:var(--bk);}
.content{padding:1.8rem;}
.panel{background:#fff;border-radius:14px;border:1px solid #EBEBEB;padding:1.4rem;margin-bottom:1.4rem;}
.btn-y{background:var(--y);color:var(--bk);font-weight:700;border:none;border-radius:8px;}
.btn-y:hover{background:var(--yd);color:var(--bk);}
.form-control:focus,.form-select:focus{border-color:var(--y);box-shadow:0 0 0 3px rgba(245,200,0,.2);}
.modal-header{background:var(--bk);}
.modal-title{color:var(--y);font-weight:700;}
.table th{background:var(--bk);color:rgba(255,255,255,.8);font-size:.82rem;font-weight:600;border:none;}
.table td{vertical-align:middle;font-size:.88rem;border-color:#F0F0F0;}
.table tbody tr:hover{background:#FFFDE7;}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sb-header">
    <div class="sb-logo">A</div>
    <div><div class="sb-brand">Andik's Desserts</div><div class="sb-role" id="roleLabel">Staff Portal</div></div>
  </div>
  <nav style="padding:1rem 0;flex:1;overflow-y:auto">
    <div class="sb-label">Main</div>
    <a href="dashboard.html" class="sb-link"><i class="bi bi-speedometer2"></i>Dashboard</a>
    <div class="sb-label">Menu</div>
    <a href="menu.html" class="sb-link active"><i class="bi bi-grid"></i>Menu Items</a>
    <div class="sb-label">Engagement</div>
    <a href="comments.html" class="sb-link"><i class="bi bi-chat-left-text"></i>Comments</a>
    <a href="staff-announcements.html" class="sb-link"><i class="bi bi-megaphone"></i>Announcements</a>
    <div id="adminLinks"></div>
  </nav>
  <div class="sb-footer">
    <button class="btn btn-sm w-100" style="background:rgba(255,255,255,.08);color:rgba(255,255,255,.6);border:none;border-radius:8px;padding:.5rem" onclick="DB.logout();location.href='http://localhost/project/group-24/customer/login.html'">
      <i class="bi bi-box-arrow-right me-2"></i>Logout
    </button>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-title">Menu Items</div>
    <div class="d-flex align-items-center gap-2">
      <div class="avatar" id="userAvatar">?</div>
      <div class="d-none d-md-block">
        <div style="font-weight:600;font-size:.85rem" id="userName"></div>
        <div style="font-size:.72rem;color:#999" id="userRole"></div>
      </div>
    </div>
  </div>
  <div class="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div><h5 class="mb-0" style="font-weight:700">All Menu Items</h5><p class="text-muted mb-0" style="font-size:.82rem">Manage your dessert menu</p></div>
      <button class="btn btn-y d-flex align-items-center gap-2" data-bs-toggle="modal" data-bs-target="#itemModal" onclick="openAdd()"><i class="bi bi-plus-lg"></i>Add Items</button>
    </div>
    <div class="panel py-3 mb-3">
      <input type="text" id="searchInput" class="form-control" placeholder="Search items..." style="max-width:300px;border-radius:10px" oninput="renderTable()">
    </div>
    <div class="panel p-0">
      <div class="table-responsive">
        <table class="table mb-0">
          <thead><tr><th>#</th><th>Image</th><th>Item Name</th><th>Category</th><th>Price</th><th>Stock</th><th>Status</th><th>Action</th></tr></thead>
          <tbody id="menuTable"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal fade" id="itemModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content" style="border-radius:16px;border:none">
      <div class="modal-header" style="border-radius:16px 16px 0 0">
        <h5 class="modal-title" id="modalTitle">Add Menu Item</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-4">
        <input type="hidden" id="editId">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label fw-600" style="font-weight:600;font-size:.88rem">Item Name *</label>
            <input type="text" id="fName" class="form-control" placeholder="e.g. Cendol Cake" style="border-radius:10px">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-600" style="font-weight:600;font-size:.88rem">Category *</label>
            <select id="fCat" class="form-select" style="border-radius:10px">
              <option value="">Select...</option>
              <option>Rice</option><option>Noodles</option><option>Dessert</option><option>Drinks</option><option>⭐ Today's Items</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-600" style="font-weight:600;font-size:.88rem">Price (RM) *</label>
            <input type="number" id="fPrice" class="form-control" placeholder="0.00" step="0.01" style="border-radius:10px">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-600" style="font-weight:600;font-size:.88rem">Stock Quantity *</label>
            <input type="number" id="fStock" class="form-control" placeholder="0" min="0" style="border-radius:10px">
          </div>
          <div class="col-12">
            <label class="form-label fw-600" style="font-weight:600;font-size:.88rem">Description</label>
            <textarea id="fDesc" class="form-control" rows="2" placeholder="Brief description..." style="border-radius:10px;resize:none"></textarea>
          </div>
          <div class="col-12">
            <label class="form-label fw-600" style="font-weight:600;font-size:.88rem">Availability</label>
            <div class="form-check form-switch">
              <input class="form-check-input" type="checkbox" id="fAvail" checked>
              <label class="form-check-label" for="fAvail" style="font-size:.88rem">Item is available</label>
            </div>
          </div>
        </div>
      </div>
      <div class="modal-footer border-0 pt-0">
        <button type="button" class="btn btn-light" data-bs-dismiss="modal" style="border-radius:8px">Cancel</button>
        <button type="button" class="btn btn-y" onclick="saveItem()"><i class="bi bi-save me-1"></i>Save Item</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../phpdata/data.js"></script>
<script>
const user = DB.currentUser();
if (!user || (user.role !== 'staff' && user.role !== 'admin')) location.href = 'http://localhost/project/group-24/customer/login.html';
document.getElementById('userAvatar').textContent = user.name.charAt(0).toUpperCase();
document.getElementById('userName').textContent = user.name;
document.getElementById('userRole').textContent = user.role.charAt(0).toUpperCase() + user.role.slice(1);
document.getElementById('roleLabel').textContent = user.role === 'admin' ? 'Admin Portal' : 'Staff Portal';
if (user.role === 'admin') document.getElementById('adminLinks').innerHTML = `<div class="sb-label">Admin</div><a href="http://localhost/project/admin/dashboard.html" class="sb-link"><i class="bi bi-people"></i>Manage Staff</a>`;

const MENU_API = "http://localhost/project/group-24";

async function renderTable() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const res = await fetch(`${MENU_API}/get_menu.php`);
  const allItems = await res.json();
  const items = allItems.filter(i => i.name.toLowerCase().includes(search));
  const tb = document.getElementById('menuTable');
  if (!items.length) { tb.innerHTML = '<tr><td colspan="8" class="text-center text-muted py-4">No items found.</td></tr>'; return; }
  tb.innerHTML = items.map((item, idx) => `
    <tr>
      <td class="text-muted" style="font-size:.8rem">${idx+1}</td>
      <td><img src="${item.image}" style="width:46px;height:46px;border-radius:8px;object-fit:cover" onerror="this.src='../assets/images/placeholder.png'"></td>
      <td style="font-weight:600">${item.name}</td>
      <td><span style="background:#F4F5F7;padding:3px 10px;border-radius:20px;font-size:.78rem">${item.category}</span></td>
      <td style="font-weight:600">RM ${parseFloat(item.price).toFixed(2)}</td>
      <td>${item.stock}</td>
      <td>${item.available == 1 ? '<span class="badge" style="background:#E8F5E9;color:#2E7D32;font-size:.72rem">Available</span>' : '<span class="badge" style="background:#FFEBEE;color:#C62828;font-size:.72rem">Out of Stock</span>'}</td>
      <td>
        <div class="d-flex gap-1">
          <button class="btn btn-sm" style="background:#EDE7F6;color:#6A1B9A;border:none;border-radius:7px" onclick="openEdit(${item.id}, this)"><i class="bi bi-pencil"></i></button>
          <button class="btn btn-sm" style="background:#FFEBEE;color:#C62828;border:none;border-radius:7px" onclick="delItem(${item.id})"><i class="bi bi-trash"></i></button>
        </div>
      </td>
    </tr>`).join('');
}

function openAdd() {
  document.getElementById('modalTitle').textContent = 'Add Menu Item';
  document.getElementById('editId').value = '';
  ['fName','fCat','fPrice','fStock','fDesc'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fAvail').checked = true;
}

function openEdit(id, btn) {
  fetch(`${MENU_API}/get_menu.php`)
    .then(r => r.json())
    .then(items => {
      const item = items.find(i => i.id == id);
      document.getElementById('modalTitle').textContent = 'Edit Item';
      document.getElementById('editId').value = item.id;
      document.getElementById('fName').value = item.name;
      document.getElementById('fCat').value = item.category;
      document.getElementById('fPrice').value = item.price;
      document.getElementById('fStock').value = item.stock;
      document.getElementById('fDesc').value = item.description || '';
      document.getElementById('fAvail').checked = item.available == 1;
      new bootstrap.Modal(document.getElementById('itemModal')).show();
    });
}

async function saveItem() {
  const name = document.getElementById('fName').value.trim();
  const cat = document.getElementById('fCat').value;
  const price = parseFloat(document.getElementById('fPrice').value);
  const stock = parseInt(document.getElementById('fStock').value);
  if (!name || !cat || isNaN(price) || isNaN(stock)) { alert('Please fill in all required fields.'); return; }

  const editId = document.getElementById('editId').value;
  const currentImage = document.getElementById('editId').value 
    ? (await (await fetch(`${MENU_API}/get_menu.php`)).json()).find(i => i.id == document.getElementById('editId').value)?.image || `https://placehold.co/400x300/F5C800/1A1A1A?text=${encodeURIComponent(name)}`
    : `https://placehold.co/400x300/F5C800/1A1A1A?text=${encodeURIComponent(name)}`;

  const obj = {
    name, category: cat, price, stock,
    available: document.getElementById('fAvail').checked ? 1 : 0,
    description: document.getElementById('fDesc').value.trim(),
    image: currentImage
  };

  if (editId) {
    obj.id = parseInt(editId);
    await fetch(`${MENU_API}/update_menu.php`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(obj)
    });
  } else {
    await fetch(`${MENU_API}/add_menu.php`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(obj)
    });
  }

  bootstrap.Modal.getInstance(document.getElementById('itemModal')).hide();
  renderTable();
}

async function delItem(id) {
  if (!confirm('Delete this item?')) return;
  await fetch(`${MENU_API}/delete_menu.php`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id })
  });
  renderTable();
}

renderTable();
</script>
</body>
</html>
